services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Passed at build time so Next.js bakes the correct URL into the bundle.
        # Inside the compose network the frontend container reaches the backend
        # by service name, not localhost.
        API_URL: http://backend:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
